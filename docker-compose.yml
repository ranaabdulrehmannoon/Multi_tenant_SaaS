version: "3.9"

services:
  # ── PostgreSQL 15 ──────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: multitenant_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-superadmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-supersecret}
      POSTGRES_DB:       ${POSTGRES_DB:-multitenant_saas}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      # These SQL files run automatically on first startup (alphabetical order)
      - ./sql/00_master_registry.sql:/docker-entrypoint-initdb.d/00_master_registry.sql
      - ./sql/01_model_a_shared_schema.sql:/docker-entrypoint-initdb.d/01_model_a_shared_schema.sql
      - ./sql/02_seed_superadmin.sql:/docker-entrypoint-initdb.d/02_seed_superadmin.sql
      - ./sql/04_audit_triggers.sql:/docker-entrypoint-initdb.d/04_audit_triggers.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-superadmin} -d ${POSTGRES_DB:-multitenant_saas}"]
      interval: 5s
      timeout: 5s
      retries: 15

  # ── Redis 7 ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: multitenant_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redissecret}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redissecret}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Flask API + GUI ────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: multitenant_api
    restart: unless-stopped
    ports:
      - "5000:5000"
    # Inside Docker, containers talk to each other by SERVICE NAME, not localhost.
    # These environment variables OVERRIDE anything in .env:
    environment:
      POSTGRES_HOST:    postgres       # ← service name, not localhost
      POSTGRES_PORT:    5432
      POSTGRES_USER:    ${POSTGRES_USER:-superadmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-supersecret}
      POSTGRES_DB:      ${POSTGRES_DB:-multitenant_saas}
      REDIS_HOST:       redis          # ← service name, not localhost
      REDIS_PORT:       6379
      REDIS_PASSWORD:   ${REDIS_PASSWORD:-redissecret}
      REDIS_DB:         0
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-dev-secret-change-in-production}
      FLASK_ENV:        development
      JWT_SECRET_KEY:   ${JWT_SECRET_KEY:-dev-jwt-secret-change-in-production}
      JWT_EXPIRY_SECONDS: 3600
      PG_POOL_MIN:      2
      PG_POOL_MAX:      20
      CACHE_TTL_SECONDS: 60
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Mount source code so changes reflect without rebuild
      - .:/app
    working_dir: /app
    command: >
      python -m flask --app api/app run
      --host 0.0.0.0
      --port 5000
      --debug

volumes:
  pg_data:
  redis_data:
